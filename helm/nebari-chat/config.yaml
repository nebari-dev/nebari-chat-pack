security:
  authenticator:
    cls_or_fn: ravnar_nebari.keycloak_authenticator
    params:
      keycloak_url: '{{ printf "%s://%s" (.Values.ravnarNebari.nebariapp.routing.tls.enabled | ternary "https" "http") .Values.keycloak.hostname }}'
      realm: "{{ .Values.keycloak.realm }}"
      client_id: "{{ .Values.keycloak.clientId }}"
