name: helm

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ['chart/v[0-9]+\.[0-9]+\.[0-9]+']

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute workflow metadata
        id: workflow-metadata
        uses: ./.github/actions/workflow-metadata

      - name: Install mise and setup helm
        uses: jdx/mise-action@v4
        with:
          mise_toml: |
            [tools]
            helm = "latest"

      - name: Patch helm chart
        uses: ./.github/actions/patch-helm-chart
        with:
          chart-version: ${{ steps.metadata.outputs.version-chart }}
          app-version: ${{ steps.metadata.outputs.version-latest }}

      - name: Install chart dependencies
        run: helm dependencies update ./helm/nebari-chat

      - name: Package helm chart
        run: helm package ./helm/nebari-chat

      - name: Login to Quay.io
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Push helm chart
        if: ${{ github.event_name != 'pull_request' }}
        run: helm push 'nebari-chat-${{ steps.metadata.outputs.version-chart }}.tgz' oci://quay.io/nebari/charts
