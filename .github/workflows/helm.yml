name: helm

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ['chart/v[0-9]+\.[0-9]+\.[0-9]+']

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute workflow metadata
        id: workflow-metadata
        uses: ./.github/actions/workflow-metadata

      - name: Install mise and setup helm
        uses: jdx/mise-action@v4
        with:
          mise_toml: |
            [tools]
            helm = "latest"
            dasel = "3"

      - name: Compute chart versions
        id: chart-versions
        run: |
          CHART_BASE=$(echo '${{ fromJson(steps.workflow-metadata.outputs.chart-version-json).base }}')
          SHA=$(echo '${{ fromJson(steps.workflow-metadata.outputs.app-version-json).commit }}')
          WORKFLOW_TYPE='${{ steps.workflow-metadata.outputs.workflow-type }}'

          case "${WORKFLOW_TYPE}" in
            PR)
              PR_NUMBER='${{ github.event.number }}'
              CHART_VERSIONS="[\"${CHART_BASE}-pr.${PR_NUMBER}\", \"${CHART_BASE}-pr.${PR_NUMBER}.${SHA}\"]"
              ;;
            main)
              CHART_VERSIONS="[\"${CHART_BASE}-main\"]"
              ;;
            release)
              CHART_VERSIONS="[\"${CHART_BASE}\"]"
              ;;
            *)
              echo "unknown workflow type '${WORKFLOW_TYPE}'" >&2
              exit 1
              ;;
          esac

          echo "chart-versions-json=${CHART_VERSIONS}" | tee --append "${GITHUB_OUTPUT}"

      - name: Install chart dependencies (first version)
        run: |
          FIRST_CHART_VERSION=$(echo '${{ steps.chart-versions.outputs.chart-versions-json }}' | jq --raw-output '.[0]')
          APP_STABLE_TAG='${{ steps.workflow-metadata.outputs.stable-tag }}'

          # Patch Chart.yaml and values.yaml for the first version
          FILE='./helm/nebari-chat/Chart.yaml'
          CONTENT=$(dasel --out=yaml \
            --var="chart=yaml:file:${FILE}" \
            --var="chartVersion='${FIRST_CHART_VERSION}'" \
            --var="appVersion='${APP_STABLE_TAG}'" \
            'merge($chart, {"version": $chartVersion, "appVersion": $appVersion})' \
          )
          echo "${CONTENT}" | tee ${FILE}

          FILE='./helm/nebari-chat/values.yaml'
          CONTENT=$(dasel --out=yaml \
            --var="values=yaml:file:${FILE}" \
            --var="appVersion='${APP_STABLE_TAG}'" \
            'merge($values, {"ravnar": {"image": {"tag": $appVersion}}})' \
          )
          echo "${CONTENT}" | tee ${FILE}

          helm dependencies update ./helm/nebari-chat

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Package and push all chart versions
        run: |
          APP_STABLE_TAG='${{ steps.workflow-metadata.outputs.stable-tag }}'

          for CHART_VERSION in $(echo '${{ steps.chart-versions.outputs.chart-versions-json }}' | jq --raw-output '.[]'); do
            echo "--- Packaging chart version: ${CHART_VERSION} ---"

            # Patch Chart.yaml for this version
            FILE='./helm/nebari-chat/Chart.yaml'
            CONTENT=$(dasel --out=yaml \
              --var="chart=yaml:file:${FILE}" \
              --var="chartVersion='${CHART_VERSION}'" \
              --var="appVersion='${APP_STABLE_TAG}'" \
              'merge($chart, {"version": $chartVersion, "appVersion": $appVersion})' \
            )
            echo "${CONTENT}" | tee ${FILE}

            # Package
            helm package ./helm/nebari-chat

            # Push
            helm push nebari-chat-*.tgz oci://quay.io/nebari/charts

            # Clean up the packaged file
            rm -f nebari-chat-*.tgz
          done
