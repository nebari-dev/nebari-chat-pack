name: helm

on:
  pull_request:
  push:
    branches: 
      - "main"
    tags: 
      - 'chart/v[0-9]+\.[0-9]+\.[0-9]+'

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute workflow metadata
        id: workflow-metadata
        uses: ./.github/actions/workflow-metadata

      - name: Set helm matrix
        id: helm-matrix
        run: |
          MATRIX=$(jq --null-input --compact-output \
            --argjson chart '${{ steps.workflow-metadata.outputs.chart-version-json }}' \
            --argjson app '${{ steps.workflow-metadata.outputs.app-version-json }}' \
            '{"include": ($chart.tags | map({"chart-version": ., "app-version": $app."stable-tag" }))}' \
          )
          echo "matrix-json=${MATRIX}" | tee --append "${GITHUB_OUTPUT}"
    outputs:
      matrix-json: ${{ steps.helm-matrix.outputs.matrix-json }}

  helm:
    needs: metadata
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.metadata.outputs.matrix-json) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install mise and setup helm
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          mise_toml: |
            [tools]
            helm = "latest"

      - name: Patch helm chart
        uses: ./.github/actions/patch-helm-chart
        with:
          chart-version: ${{ matrix.chart-version }}
          app-version: ${{ matrix.app-version }}

      - name: Install chart dependencies
        run: helm dependencies update ./helm/nebari-chat

      - name: Package helm chart
        run: helm package ./helm/nebari-chat

      - name: Determine registry publishing
        id: registry
        shell: bash
        env:
          DOCKER_REGISTRY_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: |
          PUBLISH=false
          if [[ '${{ github.event_name }}' != 'pull_request' ]]; then
            PUBLISH=true
          elif [[ -n "${DOCKER_REGISTRY_USERNAME}" && -n "${DOCKER_REGISTRY_PASSWORD}" ]]; then
            PUBLISH=true
          fi

          echo "publish=${PUBLISH}" | tee --append "${GITHUB_OUTPUT}"

      - name: Login to Quay.io
        if: steps.registry.outputs.publish == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Push helm chart
        if: steps.registry.outputs.publish == 'true'
        run: helm push nebari-chat-*.tgz oci://quay.io/nebari/charts
