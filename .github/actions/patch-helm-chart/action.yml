name: patch-helm-chart
description: "Patch helm chart"

inputs:
  chart-version:
    description: Chart version
  app-version:
    description: App version

runs:
  using: composite

  steps:
    - name: Install mise and setup dasel
      uses: jdx/mise-action@v4
      with:
        mise_toml: |
          [tools]
          dasel = "3"

    - name: Inject versions into helm chart
      shell: bash
      run: |
        FILE='./helm/nebari-chat/Chart.yaml'

        CONTENT=$(dasel --out=yaml \
          --var="chart=yaml:file:${FILE}" \
          --var="chartVersion='${{ inputs.chart-version }}'" \
          --var="appVersion='${{ inputs.app-version }}'" \
          'merge($chart, {"version": $chartVersion, "appVersion": $appVersion})' \
        )
        echo "${CONTENT}" | tee ${FILE}

    - name: Inject app version into ravnar image tag
      shell: bash
      run: |
        FILE='./helm/nebari-chat/values.yaml'

        CONTENT=$(dasel --out=yaml \
          --var="values=yaml:file:${FILE}" \
          --var="appVersion='${{ inputs.app-version }}'" \
          'merge($values, {"ravnar": {"image": {"tag": $appVersion}}})' \
        )
        echo "${CONTENT}" | tee ${FILE}
