name: workflow-metadata
description: "Compute workflow metadata"

outputs:
  workflow-type:
    description: Workflow type. One of 'PR', 'main', or 'release'
    value: ${{ steps.workflow.outputs.workflow-type }}
  app-version-json:
    description: App version info as JSON
    value: ${{ steps.versions.outputs.app }}
  chart-version-json:
    description: Chart version info as JSON
    value: ${{ steps.versions.outputs.chart }}

runs:
  using: composite

  steps:
    - id: workflow
      shell: bash
      run: |
        # Compute workflow type
        case '${{ github.event_name }}' in
          pull_request)
            WORKFLOW_TYPE=PR
            ;;
          push)
            case '${{ github.ref }}' in
              refs/heads/main)
                WORKFLOW_TYPE=main
                ;;
              refs/tags/*)
                WORKFLOW_TYPE=release
                ;;
              *)
              echo "unknown push ref '${{ github.ref }}'" >&2
              exit 1
              ;;
            esac
            ;;
          *)
            echo "unknown event name '${{ github.event_name }}'" >&2
            exit 1
            ;;
        esac

        echo "workflow-type=${WORKFLOW_TYPE}" | tee --append "${GITHUB_OUTPUT}"

    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        working-directory: ./backend
        enable-cache: true

    - shell: bash
      working-directory: ./backend
      run: uv sync --link-mode copy --locked

    - id: versions
      shell: bash
      working-directory: ./backend
      run: |
        WORKFLOW_TYPE='${{ steps.workflow.outputs.workflow-type }}'

        types=(app chart)
        prefixes=("" "chart/")

        for i in 0 1; do
          TYPE="${types[$i]}"
          PATTERN_PREFIX="${prefixes[$i]}"

          # 1. Extract latest version using git describe
          LATEST=$(git describe --tags --match "${PATTERN_PREFIX}v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 | sed "s|^${PATTERN_PREFIX}v||")

          # 2. Extract version data using the python script
          VERSION_DATA=$(uv run python ../.github/actions/workflow-metadata/compute_version.py --root . --pattern-prefix "${PATTERN_PREFIX}")
          BASE=$(echo "${VERSION_DATA}" | jq --raw-output '.base')
          COMMIT=$(echo "${VERSION_DATA}" | jq --raw-output '.commit')
          VERSION=$(echo "${VERSION_DATA}" | jq --raw-output '.version')

          # 3. Compute stable-tag and tags array based on workflow type
          case "${WORKFLOW_TYPE}" in
            PR)
              PR_NUMBER='${{ github.event.number }}'
              STABLE_TAG="${BASE}-pr.${PR_NUMBER}"
              ADDITONAL_TAGS=("${BASE}-pr.${PR_NUMBER}.${COMMIT}")
              ;;
            main)
              STABLE_TAG="${BASE}-main"
              ADDITONAL_TAGS=()
              ;;
            release)
              STABLE_TAG="${BASE}"
              ADDITONAL_TAGS=()
              ;;
            *)
              echo "unknown workflow type '${WORKFLOW_TYPE}'" >&2
              exit 1
              ;;
          esac

          # 4. Convert bash array to JSON via jq
          TAGS_JSON=$(jq --null-input --compact-output \
            '$ARGS.positional' \
            --args "${STABLE_TAG}" "${ADDITIONAL_TAGS[@]}" \
          )

          OUTPUT_JSON=$(jq --null-input --compact-output \
            --arg latest "${LATEST}" \
            --arg version "${VERSION}" \
            --arg base "${BASE}" \
            --arg stable "${STABLE_TAG}" \
            --argjson tags "${TAGS_JSON}" \
            '{"latest": $latest, "version": $version, "base": $base, "stable-tag": $stable, "tags": $tags}' \
          )

          echo "${TYPE}=${OUTPUT_JSON}" | tee --append "${GITHUB_OUTPUT}"
        done
