name: workflow-metadata
description: "Compute workflow metadata"

outputs:
  chart-version:
    description: Chart version
    value: ${{ steps.chart.outputs.version }}
  app-version:
    description: App version
    value: ${{ steps.app.outputs.version }}

runs:
  using: composite

  steps:
    - id: chart
      shell: bash
      run: |
        VERSION=$(git describe --tags --match "chart/v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 | sed 's|^chart/v||')
        echo "version=${VERSION}" | tee --append "${GITHUB_OUTPUT}"

    - id: app
      shell: bash
      run: |
        VERSION=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 | sed 's|^v||')
        echo "version=${VERSION}" | tee --append "${GITHUB_OUTPUT}"
