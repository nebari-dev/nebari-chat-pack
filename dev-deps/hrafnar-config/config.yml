server:
  hostname: 0.0.0.0

models:

  claude-sonnet-4:
    cls_or_fn: hrafnar.models.PydanticAIModelWrapper
    params:
      model:
        cls_or_fn: pydantic_ai.models.openai.OpenAIModel
        params:
          model_name: anthropic/claude-sonnet-4
          provider: &openrouter-provider
            cls_or_fn: pydantic_ai.providers.openrouter.OpenRouterProvider
            params:
              api_key: "{{ OPENROUTER_API_KEY }}"
      display_name: Claude Sonnet 4
      supports_tool_calls: true
      supports_files: true

  gemini-2.5-flash:
    cls_or_fn: hrafnar.models.PydanticAIModelWrapper
    params:
      model:
        cls_or_fn: pydantic_ai.models.openai.OpenAIModel
        params:
          model_name: google/gemini-2.5-flash
          provider: *openrouter-provider
      supports_tool_calls: true
      supports_files: true
      display_name: Gemini 2.5 Flash

  gpt-5:
    cls_or_fn: hrafnar.models.PydanticAIModelWrapper
    params:
      model:
        cls_or_fn: pydantic_ai.models.openai.OpenAIModel
        params:
          model_name: openai/gpt-5
          provider: *openrouter-provider
      supports_tool_calls: true
      supports_files: true
      display_name: GPT 5

  gpt-4.1:
    cls_or_fn: hrafnar.models.PydanticAIModelWrapper
    params:
      model:
        cls_or_fn: pydantic_ai.models.openai.OpenAIModel
        params:
          model_name: openai/gpt-4.1
          provider: *openrouter-provider
      supports_tool_calls: true
      supports_files: true
      display_name: GPT 4.1

toolsets:

  web-search:
    cls_or_fn: hrafnar.toolsets.PydanticAIToolsetWrapper
    params:
      toolset:
        cls_or_fn: pydantic_ai.toolsets.FunctionToolset
        params:
          tools:
            - cls_or_fn: pydantic_ai.common_tools.duckduckgo.duckduckgo_search_tool
      display_name: DuckDuckGo Web Search
      description: Search the web using DuckDuckGo

  austin-permits:
    cls_or_fn: hrafnar.toolsets.PydanticAIToolsetWrapper
    params:
      toolset:
        cls_or_fn: pydantic_ai.mcp.MCPServerStreamableHTTP
        params:
          url: http://postgres-mcp:5000/mcp
      display_name: Austin Permits Database
      description: Explore the Austin Permits SQL DB
